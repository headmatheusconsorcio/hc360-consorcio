<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste HC360</title></head>
<body style="font:16px -apple-system,Segoe UI,sans-serif;padding:16px;color:#222;background:#fff">
<h2 style="margin:0 0 10px">Diagnóstico HC360</h2>
<p style="font-size:13px;color:#666;margin-bottom:10px">Tira um print desta tela inteira e manda pro consultor.</p>
<div id="log" style="background:#f2f2f2;border:1px solid #ddd;border-radius:8px;padding:12px;white-space:pre-wrap;font-size:13px;line-height:1.5;font-family:monospace"></div>
<p style="margin-top:16px">Arrasta o slider — o número tem que mudar:</p>
<input id="s" type="range" min="0" max="100" value="30" style="width:92%;height:30px">
<p style="font-size:20px">Valor x2 = <b id="out" style="color:#226866">?</b></p>
<p style="margin-top:8px">Tem que aparecer uma linha verde no quadro:</p>
<canvas id="c" width="300" height="80" style="border:1px solid #ccc;width:100%;height:80px"></canvas>
<script>
function L(m){var d=document.getElementById('log');d.textContent+=m+"\n";}
window.onerror=function(m,u,l){L("XX ERRO: "+m+"  (linha "+l+")");return false;};
L("1) JavaScript rodando: SIM");
L("   Navegador: "+navigator.userAgent);
L("   Tela: "+window.innerWidth+"px | DPR: "+window.devicePixelRatio);
try{L("2) Moeda (toLocaleString): "+(12345.6).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}));}catch(e){L("2) Moeda FALHOU: "+e.message);}
try{
  var s=document.getElementById("s"),out=document.getElementById("out");
  function upd(){out.textContent=s.value*2;}
  s.addEventListener("input",upd);s.addEventListener("change",upd);upd();
  L("3) Slider conectado: SIM");
}catch(e){L("3) Slider FALHOU: "+e.message);}
try{
  var c=document.getElementById("c"),x=c.getContext("2d");
  var dpr=window.devicePixelRatio||1;
  c.width=300*dpr;c.height=80*dpr;x.setTransform(dpr,0,0,dpr,0,0);
  x.strokeStyle="#226866";x.lineWidth=3;x.beginPath();x.moveTo(5,72);x.lineTo(295,8);x.stroke();
  L("4) Canvas desenhou: SIM");
}catch(e){L("4) Canvas FALHOU: "+e.message);}
L("--- fim do teste ---");
</script>
</body></html>
